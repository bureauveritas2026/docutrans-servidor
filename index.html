<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor de Documentos Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Librería para manipular ZIP/DOCX/PPTX en el cliente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-language"></i>
                <h1>DocuTrans<span class="highlight">Pro</span></h1>
            </div>
        </header>

        <main>


            <!-- Panel Principal de Traducción -->
            <div id="translationPanel" class="panel">
                <div class="language-selectors">
                    <div class="select-group">
                        <label for="sourceLang">Idioma Original</label>
                        <select id="sourceLang">
                            <option value="">Detectar automáticamente</option>
                            <option value="EN">Inglés</option>
                            <option value="FR">Francés</option>
                            <option value="DE">Alemán</option>
                            <option value="IT">Italiano</option>
                            <option value="PT">Portugués</option>
                            <option value="ZH">Chino</option>
                            <option value="JA">Japonés</option>
                        </select>
                    </div>
                    <div class="exchange-icon"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
                    <div class="select-group">
                        <label for="targetLang">Traducir a</label>
                        <select id="targetLang">
                            <option value="ES" selected>Español</option>
                            <option value="EN">Inglés</option>
                            <option value="FR">Francés</option>
                        </select>
                    </div>
                </div>

                <div class="upload-zone" id="dropZone">
                    <input type="file" id="fileInput" accept=".txt,.docx,.pptx,.pdf" hidden>
                    <div class="upload-content">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <h3>Arrastra y suelta tu documento aquí</h3>
                        <p>o haz clic para explorar</p>
                        <span class="file-types">Soporta: PDF, DOCX, PPTX, TXT</span>
                        <div class="pdf-success">
                            <i class="fa-solid fa-circle-check"></i>
                            ¡Los archivos PDF ahora son soportados! Se convertirán a Word traducido.
                        </div>
                    </div>
                </div>

                <div id="fileInfo" class="file-info hidden">
                    <i class="fa-solid fa-file-word file-icon"></i>
                    <span id="fileName">documento.docx</span>
                    <button id="removeFileBtn" class="btn-icon"><i class="fa-solid fa-trash"></i></button>
                </div>

                <button id="translateBtn" class="btn-primary btn-large disabled">Traducir Documento</button>

                <div id="statusArea" class="status-area hidden">
                    <div class="loader"></div>
                    <p id="statusText">Procesando documento...</p>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <div id="downloadArea" class="download-area hidden">
                    <div class="success-message">
                        <i class="fa-solid fa-circle-check"></i>
                        <p>¡Traducción completada con éxito!</p>
                    </div>
                    <a id="downloadLink" class="btn-success">
                        <i class="fa-solid fa-download"></i> Descargar Documento Traducido
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
