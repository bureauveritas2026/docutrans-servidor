services:
  - type: web
    name: docutrans-servidor
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    autoDeploy: true
